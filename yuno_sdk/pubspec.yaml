name: yuno
description: "Yuno Flutter SDK empowers you to create seamless payment experiences in your native Android and iOS apps built with Flutter. "
version: 1.0.9
homepage: https://www.y.uno/
environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.2
  dartdoc: ^8.0.13

flutter:
  plugin:
    platforms:
      android:
        package: com.yuno_flutter.yuno_sdk_android
        pluginClass: YunoSdkAndroidPlugin
      ios:
        pluginClass: YunoSdkFoundationPlugin